<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RajaTech | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #00f2fe; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); color: white; min-height: 100vh; }
        .header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); position: fixed; top: 0; width: 100%; z-index: 1000; }
        .logo { font-size: 1.6rem; font-weight: 700; color: var(--primary); }
        #btnLogout { padding: 8px 20px; border: 2px solid var(--primary); background: transparent; color: var(--primary); border-radius: 50px; cursor: pointer; font-weight: 600; }
        .container { margin-top: 150px; display: flex; justify-content: center; padding: 20px; }
        .profile-card { background: rgba(30, 41, 59, 0.7); padding: 40px; border-radius: 25px; text-align: center; width: 100%; max-width: 450px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .avatar-box { width: 150px; height: 150px; margin: 0 auto 20px; border-radius: 50%; border: 4px solid var(--primary); overflow: hidden; background: #1e293b; }
        #userDP { width: 100%; height: 100%; object-fit: cover; }
        input[type="text"] { width: 100%; padding: 12px; margin: 20px 0 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        #btnUpdatePhoto { width: 100%; padding: 12px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">RAJATECH</div>
        <button id="btnLogout">Logout</button>
    </header>
    <div class="container">
        <div class="profile-card">
            <div class="avatar-box">
                <img id="userDP" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile">
            </div>
            <h1 id="welcomeMessage">Loading...</h1>
            <p id="userEmailDisplay">---</p>
            <input type="text" id="photoURLInput" placeholder="Paste Direct Image Link (jpg/png)">
            <button id="btnUpdatePhoto">Update Profile</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
