<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Dashboard | RAJATECH</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        .dash-body { background: #020617; color: #fff; min-height: 100vh; padding-top: 100px; }
        .profile-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 254, 0.2);
            backdrop-filter: blur(15px); border-radius: 30px; width: 90%; max-width: 400px;
            margin: 0 auto; padding: 30px; text-align: center;
        }
        .avatar-zone { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; }
        #userDP { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #00f2fe; background: #1e293b; }
        #fileInput { display: none; }
        .upload-label {
            position: absolute; bottom: 0; right: 0; background: #00f2fe; color: #000;
            width: 35px; height: 35px; border-radius: 50%; display: flex; 
            justify-content: center; align-items: center; cursor: pointer; font-weight: bold;
        }

        .btn-action { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-update { background: #10b981; color: #fff; display: none; } /* Hidden until change */
        .btn-view { background: linear-gradient(45deg, #00f2fe, #0072ff); color: #fff; }
        .btn-logout { background: transparent; border: 2px solid #ff4757; color: #ff4757; }

        /* ID MODAL */
        .id-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 2000; justify-content: center; align-items: center; flex-direction: column;
        }
        .id-modal.active { display: flex; }

        /* PROFESSIONAL CYBER ID */
        #idCardContent {
            width: 340px; height: 520px; background: #050816; border-radius: 20px;
            border: 2px solid #00f2fe; position: relative; padding: 25px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.2);
        }
        .id-logo { font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 20px; border-bottom: 1px solid rgba(0,242,254,0.3); padding-bottom: 10px; }
        .id-photo-frame { width: 130px; height: 130px; margin: 0 auto 15px; border: 2px solid #00f2fe; border-radius: 10px; overflow: hidden; }
        #idPhoto { width: 100%; height: 100%; object-fit: cover; }
        
        #idQRCode { 
            width: 90px; height: 90px; margin: 15px auto; padding: 8px; 
            background: #fff; border-radius: 10px; border: 3px solid #00f2fe;
        }
        #idQRCode img { width: 100% !important; height: 100% !important; }

        .modal-btns { display: flex; gap: 10px; width: 340px; margin-top: 20px; }
    </style>
</head>
<body class="dash-body">

    <div class="profile-card">
        <div class="avatar-zone">
            <img id="userDP" src="">
            <label for="fileInput" class="upload-label">✎</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <h2 id="userName">Loading...</h2>
        <p id="userEmail">...</p>
        
        <button id="saveBtn" class="btn-action btn-update">Save Profile Changes</button>
        <button class="btn-action btn-view" id="viewID">View Identity Card</button>
        <button class="btn-action btn-logout" id="logoutBtn">Logout</button>
    </div>

    <div class="id-modal" id="idModal">
        <div id="idCardContent">
            <div class="id-logo">RAJA<span style="color:#00f2fe">TECH</span> ELITE</div>
            <div class="id-photo-frame">
                <img id="idPhoto" src="" crossorigin="anonymous">
            </div>
            <h2 id="idCardName" style="color:#fff; margin:10px 0 5px;">...</h2>
            <p id="idCardEmail" style="color:#94a3b8; font-size:0.8rem;">...</p>
            
            <div id="idQRCode"></div>
            
            <p style="font-size:0.6rem; color:#00f2fe; margin-top:10px; letter-spacing:2px;">OFFICIAL ACCESS KEY</p>
            <p id="idUIDText" style="font-size:0.5rem; color:#475569;"></p>
        </div>

        <div class="modal-btns">
            <button class="btn-action" style="background:#00f2fe; color:#000;" id="finalDownload">Download ID</button>
            <button class="btn-action" style="background:#ff4757; color:#fff;" id="closeID">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMwFJfbkdFjxWzNhMccXs9FbhqntSKdRM",
            authDomain: "portfolio-auth-19a5e.firebaseapp.com",
            projectId: "portfolio-auth-19a5e",
            storageBucket: "portfolio-auth-19a5e.firebasestorage.app",
            messagingSenderId: "211741915178",
            appId: "1:211741915178:web:b96f48f37ef2477b83ab53"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserData = null;
        let pendingImage = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                
                if (snap.exists()) {
                    currentUserData = snap.data();
                    updateUI(currentUserData, user.uid);
                }

                // PHOTO CHANGE LOGIC
                document.getElementById('fileInput').onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        pendingImage = reader.result;
                        document.getElementById('userDP').src = pendingImage;
                        document.getElementById('saveBtn').style.display = 'block'; // Show Update button
                    };
                    if (file) reader.readAsDataURL(file);
                };

                // SAVE BUTTON LOGIC
                document.getElementById('saveBtn').onclick = async () => {
                    try {
                        Swal.fire({ title: 'Saving...', didOpen: () => Swal.showLoading() });
                        await updateDoc(userRef, { profilePic: pendingImage });
                        document.getElementById('saveBtn').style.display = 'none';
                        Swal.fire('Success', 'Profile Updated!', 'success');
                        location.reload(); // Refresh to lock changes
                    } catch (e) { Swal.fire('Error', 'Failed to save', 'error'); }
                };

            } else { window.location.href = "index.html"; }
        });

        function updateUI(data, uid) {
            const img = data.profilePic || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
            document.getElementById('userName').innerText = data.username;
            document.getElementById('userEmail').innerText = data.email;
            document.getElementById('userDP').src = img;

            // ID Card Data
            document.getElementById('idCardName').innerText = data.username;
            document.getElementById('idCardEmail').innerText = data.email;
            document.getElementById('idPhoto').src = img;
            document.getElementById('idUIDText').innerText = "UID: " + uid;

            // QR Code
            document.getElementById("idQRCode").innerHTML = ""; // Clear old
            new QRCode(document.getElementById("idQRCode"), {
                text: uid, width: 80, height: 80, colorDark: "#000", colorLight: "#fff"
            });
        }

        // Modal Logic
        document.getElementById('viewID').onclick = () => document.getElementById('idModal').classList.add('active');
        document.getElementById('closeID').onclick = () => document.getElementById('idModal').classList.remove('active');

        // Download Logic (FIXED FOR PHOTOS)
        document.getElementById('finalDownload').onclick = () => {
            const card = document.getElementById('idCardContent');
            html2canvas(card, { 
                scale: 3, 
                useCORS: true, 
                allowTaint: true,
                backgroundColor: "#050816" 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'RAJATECH_ID.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
